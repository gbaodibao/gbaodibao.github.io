<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; }
      #overlay { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; align-items: center; }
      button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #c0392b; color: white; border: none; border-radius: 10px; box-shadow: 0 4px #962d22; }
      button:active { box-shadow: 0 0 #962d22; transform: translateY(4px); }
      #info { margin-bottom: 10px; color: white; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-family: sans-serif; text-align: center; }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div id="info"></div>
      <button id="next-btn">TRANG KẾ</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./bandongnamA.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <!-- KHAI BÁO THÊM FILE CỜ MỚI 
      <a-assets timeout="10000">
        <a-asset-item id="moHinhCo" src="./vietnams_flag.glb"></a-asset-item>
        <a-asset-item id="moHinhCo2" src="./vietnam_flag.glb"></a-asset-item> <!-- FILE CỜ MỚI CHO TRANG 1 -->
        <a-asset-item id="moHinhTau" src="./container_ship.glb"></a-asset-item>
        <a-asset-item id="moHinhTauCa" src="./fishing_boat.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <!-- BƯỚC 1: CẬP NHẬT LẠI TỌA ĐỘ VÀ THÊM CỜ MỚI -->
        <a-entity id="step1" visible="true">
          <!-- Chữ đã được kéo về đúng vị trí -->
          <a-text value="Viet Nam" color="#800000" position="-0.15 0.45 0" scale="0.3 0.3 0.3"></a-text>
          <a-text value="Qd Hoang Sa" color="#0066ff" position="0.1 0.35 0" scale="0.3 0.3 0.3"></a-text>
          <a-text value="Qd Truong Sa" color="#0066ff" position="0.1 0.2 0" scale="0.3 0.3 0.3"></a-text>

          <!-- Cờ mới: Dựng đứng (90 0 0), đặt cạnh chữ Viet Nam và KHÔNG dùng animation -->
          <a-gltf-model src="#moHinhCo2" position="-0.005 0.4 0" rotation="90 0 0" scale="0.01 0.01 0.01"></a-gltf-model>
        </a-entity>

        <!-- BƯỚC 2: Cờ (xoay) + Tàu chở hàng tương tác -->
        <a-entity id="step2" visible="false">
          <!-- Lá cờ quay vòng -->
          <a-entity position="-0.1 0.5 0" animation="property: rotation; to: 0 0 360; loop: true; dur: 4000; easing: linear">
            <a-gltf-model src="#moHinhCo" rotation="90 0 0" scale="0.001 0.001 0.001"></a-gltf-model>
          </a-entity>
          
          <!-- Tàu chở hàng -->
          <a-entity id="tau-tuong-tac" position="0.2 0.1 0" rotation="0 0 0" scale="1 1 1">
             <a-gltf-model src="#moHinhTau" rotation="90 0 0" scale="0.01 0.01 0.01"></a-gltf-model>
          </a-entity>
        </a-entity>

        <!-- BƯỚC 3: Cờ (xoay) + Tàu cá tương tác -->
        <a-entity id="step3" visible="false">
          <!-- Lá cờ quay vòng -->
          <a-entity position="-0.1 0.5 0" animation="property: rotation; to: 0 0 360; loop: true; dur: 4000; easing: linear">
            <a-gltf-model src="#moHinhCo" rotation="90 0 0" scale="0.001 0.001 0.001"></a-gltf-model>
          </a-entity>
          
          <!-- Tàu cá -->
          <a-entity id="tau-ca-tuong-tac" position="0.2 0.1 0" rotation="0 0 0" scale="1 1 1">
             <a-gltf-model src="#moHinhTauCa" rotation="90 0 0" scale="0.07 0.07 0.07"></a-gltf-model>
          </a-entity>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      // ---- LOGIC CHUYỂN TRANG ----
      let currentStep = 1;
      const btn = document.querySelector("#next-btn");
      const info = document.querySelector("#info");
      const steps = ["step1", "step2", "step3"];
      const labels = [
        
      ];

      btn.addEventListener("click", () => {
        document.querySelector("#" + steps[currentStep-1]).setAttribute("visible", false);
        currentStep = (currentStep % 3) + 1;
        document.querySelector("#" + steps[currentStep-1]).setAttribute("visible", true);
        info.innerText = labels[currentStep-1];
      });

      // ---- LOGIC TƯƠNG TÁC THÔNG MINH CHO CẢ 2 BƯỚC ----
      function getActiveTarget() {
        if (currentStep === 2) return document.querySelector("#tau-tuong-tac");
        if (currentStep === 3) return document.querySelector("#tau-ca-tuong-tac");
        return null;
      }
      
      let isDragging = false;
      let previousX = 0; 
      let initialDistance = 0; 
      let initialScale = {x: 1, y: 1, z: 1};

      // 1. CHUỘT MÁY TÍNH
      document.addEventListener('mousedown', (e) => {
        const target = getActiveTarget();
        if (!target) return;
        isDragging = true;
        previousX = e.clientX;
      });

      document.addEventListener('mousemove', (e) => {
        const target = getActiveTarget();
        if (!target || !isDragging) return;
        let deltaX = e.clientX - previousX;
        let currentRot = target.getAttribute('rotation') || {x:0, y:0, z:0};
        
        target.setAttribute('rotation', {
          x: currentRot.x,
          y: currentRot.y,
          z: currentRot.z + deltaX * 0.5 
        });
        previousX = e.clientX;
      });

      document.addEventListener('mouseup', () => { isDragging = false; });
      document.addEventListener('mouseleave', () => { isDragging = false; });

      document.addEventListener('wheel', (e) => {
        const target = getActiveTarget();
        if (!target) return;
        let currentScale = target.getAttribute('scale') || {x:1, y:1, z:1};
        let zoomFactor = e.deltaY > 0 ? 0.9 : 1.1; 
        let newScaleX = currentScale.x * zoomFactor;

        if(newScaleX > 0.2 && newScaleX < 5) {
          target.setAttribute('scale', {
            x: currentScale.x * zoomFactor,
            y: currentScale.y * zoomFactor,
            z: currentScale.z * zoomFactor
          });
        }
      });

      // 2. CẢM ỨNG ĐIỆN THOẠI
      document.addEventListener('touchstart', (e) => {
        const target = getActiveTarget();
        if (!target) return; 
        if (e.touches.length === 1) {
          isDragging = true;
          previousX = e.touches[0].clientX;
        } else if (e.touches.length === 2) {
          isDragging = false;
          let dx = e.touches[0].clientX - e.touches[1].clientX;
          let dy = e.touches[0].clientY - e.touches[1].clientY;
          initialDistance = Math.sqrt(dx*dx + dy*dy);
          let currentScale = target.getAttribute('scale') || {x:1, y:1, z:1};
          initialScale = {x: currentScale.x, y: currentScale.y, z: currentScale.z};
        }
      });

      document.addEventListener('touchmove', (e) => {
        const target = getActiveTarget();
        if (!target) return;
        if (e.touches.length === 1 && isDragging) {
          let currentX = e.touches[0].clientX;
          let deltaX = currentX - previousX;
          let currentRot = target.getAttribute('rotation') || {x:0, y:0, z:0};
          target.setAttribute('rotation', {
            x: currentRot.x,
            y: currentRot.y,
            z: currentRot.z + deltaX * 0.8 
          });
          previousX = currentX;
        } else if (e.touches.length === 2) {
          let dx = e.touches[0].clientX - e.touches[1].clientX;
          let dy = e.touches[0].clientY - e.touches[1].clientY;
          let currentDistance = Math.sqrt(dx*dx + dy*dy);
          let scaleFactor = currentDistance / initialDistance;
          let newScale = initialScale.x * scaleFactor;
          if(newScale > 0.2 && newScale < 5) {
            target.setAttribute('scale', {
              x: initialScale.x * scaleFactor,
              y: initialScale.y * scaleFactor,
              z: initialScale.z * scaleFactor
            });
          }
        }
      });

      document.addEventListener('touchend', () => { isDragging = false; });
    </script>
  </body>
</html>

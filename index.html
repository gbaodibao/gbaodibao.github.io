<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; touch-action: none; }
      #overlay { 
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
        z-index: 1000; display: flex; flex-direction: column; align-items: center; 
      }
      button { 
        padding: 15px 30px; font-size: 18px; cursor: pointer; background: #c0392b; 
        color: white; border: none; border-radius: 10px; box-shadow: 0 4px #962d22; font-weight: bold; 
      }
      button:active { box-shadow: 0 0 #962d22; transform: translateY(4px); }
      #info { 
        margin-bottom: 10px; color: white; background: rgba(0,0,0,0.7); 
        padding: 8px 20px; border-radius: 20px; font-family: sans-serif; font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div id="info">Bản đồ Việt Nam</div>
      <button id="next-btn">TRANG KẾ</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./bandongnamA.mind; filterMinCF: 0.0005; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="antialias: false; precision: mediump; colorManagement: true; physicallyCorrectLights: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets timeout="10000">
        <a-asset-item id="moHinhCo" src="./vietnams_flag.glb"></a-asset-item>
        <a-asset-item id="moHinhCo2" src="./vietnam_flag.glb"></a-asset-item>
        <a-asset-item id="moHinhTau" src="./container_ship.glb"></a-asset-item>
        <a-asset-item id="moHinhTauCa" src="./fishing_boat.glb"></a-asset-item>
        <a-asset-item id="moHinhGianKhoan" src="./dankhoan.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <!-- TRANG 1: THÔNG TIN CHUNG -->
        <a-entity id="step1" visible="true">
          <a-text value="Viet Nam" color="#800000" position="-0.15 0.45 0" scale="0.3 0.3 0.3"></a-text>
          <a-text value="Qd Hoang Sa" color="#0066ff" position="0.1 0.35 0" scale="0.3 0.3 0.3"></a-text>
          <a-text value="Qd Truong Sa" color="#0066ff" position="0.1 0.2 0" scale="0.3 0.3 0.3"></a-text>
          <a-gltf-model src="#moHinhCo2" position="-0.005 0.4 0" rotation="90 0 0" scale="0.01 0.01 0.01"></a-gltf-model>
        </a-entity>

        <!-- TRANG 2: TÀU CONTAINER -->
        <a-entity id="step2" visible="false">
          <a-entity position="-0.1 0.5 0" animation="property: rotation; to: 0 0 360; loop: true; dur: 4000; easing: linear">
            <a-gltf-model src="#moHinhCo" rotation="90 0 0" scale="0.001 0.001 0.001"></a-gltf-model>
          </a-entity>
          <a-entity id="tau-tuong-tac" position="0.2 0.1 0" rotation="0 0 0" scale="1 1 1">
             <a-gltf-model src="#moHinhTau" rotation="90 0 0" scale="0.01 0.01 0.01"></a-gltf-model>
          </a-entity>
        </a-entity>

        <!-- TRANG 3: TÀU CÁ -->
        <a-entity id="step3" visible="false">
          <a-entity position="-0.1 0.5 0" animation="property: rotation; to: 0 0 360; loop: true; dur: 4000; easing: linear">
            <a-gltf-model src="#moHinhCo" rotation="90 0 0" scale="0.001 0.001 0.001"></a-gltf-model>
          </a-entity>
          <a-entity id="tau-ca-tuong-tac" position="0.1 -0.1 0" rotation="0 0 0" scale="1 1 1">
             <a-gltf-model src="#moHinhTauCa" rotation="90 0 0" scale="0.06 0.06 0.06"></a-gltf-model>
          </a-entity>
        </a-entity>

        <!-- TRANG 4: GIÀN KHOAN (ĐÃ THU NHỎ & CHỈNH VỊ TRÍ) -->
        <a-entity id="step4" visible="false">
          <a-entity position="-0.1 0.5 0" animation="property: rotation; to: 0 0 360; loop: true; dur: 4000; easing: linear">
            <a-gltf-model src="#moHinhCo" rotation="90 0 0" scale="0.001 0.001 0.001"></a-gltf-model>
          </a-entity>
          
          <!-- CHỈNH VỊ TRÍ TẠI ĐÂY: x (ngang), y (dọc), z (sâu) -->
          <!-- scale 0.015 là đã thu nhỏ đáng kể so với trước -->
          <a-entity id="gian-khoan-tuong-tac" position="-0.035 0.07 0" rotation="0 0 0" scale="1 1 1">
             <a-gltf-model src="#moHinhGianKhoan" rotation="90 0 0" scale="0.0015 0.0015 0.0015"></a-gltf-model>
          </a-entity>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      let currentStep = 1;
      const totalSteps = 4;
      const btn = document.querySelector("#next-btn");
      const info = document.querySelector("#info");
      const steps = ["step1", "step2", "step3", "step4"];
      const labels = [
        "Bản đồ Việt Nam",
        "Giao thương hàng hải",
        "Ngư trường truyền thống",
        "khai thác dầu khí"
      ];

      // Logic chuyển trang
      btn.addEventListener("click", () => {
        document.querySelector("#" + steps[currentStep-1]).setAttribute("visible", false);
        currentStep = (currentStep % totalSteps) + 1;
        document.querySelector("#" + steps[currentStep-1]).setAttribute("visible", true);
        info.innerText = labels[currentStep-1];
      });

      // Xác định đối tượng đang được tác động
      function getActiveTarget() {
        if (currentStep === 2) return document.querySelector("#tau-tuong-tac");
        if (currentStep === 3) return document.querySelector("#tau-ca-tuong-tac");
        if (currentStep === 4) return document.querySelector("#gian-khoan-tuong-tac");
        return null;
      }
      
      // Xử lý tương tác mượt mà
      let isDragging = false;
      let previousX = 0;
      let initialDistance = 0;
      let initialScale = {x: 1, y: 1, z: 1};

      const handleStart = (clientX, touches) => {
        const target = getActiveTarget();
        if (!target) return;
        if (!touches || touches.length === 1) {
          isDragging = true;
          previousX = clientX;
        } else if (touches.length === 2) {
          isDragging = false;
          let dx = touches[0].clientX - touches[1].clientX;
          let dy = touches[0].clientY - touches[1].clientY;
          initialDistance = Math.sqrt(dx*dx + dy*dy);
          initialScale = Object.assign({}, target.getAttribute('scale'));
        }
      };

      const handleMove = (clientX, touches) => {
        const target = getActiveTarget();
        if (!target) return;

        if (isDragging && (!touches || touches.length === 1)) {
          let deltaX = clientX - previousX;
          let currentRot = target.getAttribute('rotation');
          target.setAttribute('rotation', {
            x: currentRot.x, y: currentRot.y, z: currentRot.z + deltaX * 0.5
          });
          previousX = clientX;
        } else if (touches && touches.length === 2) {
          let dx = touches[0].clientX - touches[1].clientX;
          let dy = touches[0].clientY - touches[1].clientY;
          let currentDistance = Math.sqrt(dx*dx + dy*dy);
          let factor = currentDistance / initialDistance;
          if (factor > 0.1 && factor < 10) {
            target.setAttribute('scale', {
              x: initialScale.x * factor, y: initialScale.y * factor, z: initialScale.z * factor
            });
          }
        }
      };

      // Mouse Events
      document.addEventListener('mousedown', e => handleStart(e.clientX));
      document.addEventListener('mousemove', e => handleMove(e.clientX));
      document.addEventListener('mouseup', () => isDragging = false);

      // Touch Events
      document.addEventListener('touchstart', e => handleStart(e.touches[0].clientX, e.touches));
      document.addEventListener('touchmove', e => handleMove(e.touches[0].clientX, e.touches));
      document.addEventListener('touchend', () => isDragging = false);

      // Mouse Wheel Zoom
      document.addEventListener('wheel', e => {
        const target = getActiveTarget();
        if (!target) return;
        let scale = target.getAttribute('scale');
        let factor = e.deltaY > 0 ? 0.9 : 1.1;
        target.setAttribute('scale', { x: scale.x * factor, y: scale.y * factor, z: scale.z * factor });
      });
    </script>
  </body>
</html>
